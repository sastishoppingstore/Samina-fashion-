<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#c0395a" />
  <title>Samina Fashion Store</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --rose: #c0395a;
      --rose-dark: #8c1f38;
      --gold: #d4a853;
      --cream: #fdf6f0;
      --dark: #1a0a0f;
      --muted: #7d5d66;
      --card: #fffaf7;
      --border: rgba(140, 31, 56, 0.12);
      --success: #1f9d62;
      --warning: #f39c12;
      --shadow: 0 12px 24px rgba(26, 10, 15, 0.08);
      --radius: 20px;
      --radius-sm: 14px;
      --header-h: 76px;
      --bottom-h: 76px;
      --admin-bottom-h: 78px;
      --transition: 240ms ease;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; padding: 0; background: linear-gradient(180deg, #fff7f1 0%, #fdf6f0 100%); color: var(--dark); font-family: 'DM Sans', sans-serif; overscroll-behavior-y: contain; }
    body { min-height: 100vh; display: flex; justify-content: center; }
    button, input, select, textarea { font: inherit; }
    .app-shell {
      width: min(100%, 430px);
      min-height: 100vh;
      background: var(--cream);
      position: relative;
      overflow-x: hidden;
      box-shadow: 0 0 0 1px rgba(0,0,0,0.03), 0 10px 40px rgba(26,10,15,0.08);
    }
    .safe-top { height: env(safe-area-inset-top, 0px); background: var(--rose); }
    .app-header {
      position: sticky;
      top: 0;
      z-index: 30;
      padding: 10px 16px 12px;
      background: rgba(253, 246, 240, 0.94);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(140, 31, 56, 0.08);
    }
    .header-row { display: flex; align-items: center; gap: 10px; }
    .logo-pill {
      display: flex; align-items: center; gap: 8px; flex: 1; min-width: 0;
      background: linear-gradient(135deg, var(--rose), var(--rose-dark)); color: white;
      padding: 12px 14px; border-radius: 18px; box-shadow: var(--shadow); cursor: pointer;
    }
    .logo-mark { width: 34px; height: 34px; display: grid; place-items: center; border-radius: 12px; background: rgba(255,255,255,0.18); font-size: 18px; }
    .logo-text { min-width: 0; }
    .logo-text h1 { margin: 0; font: 700 1rem 'Playfair Display', serif; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .logo-text small { display: block; font-size: 0.72rem; opacity: 0.85; }
    .icon-btn {
      border: none; width: 44px; height: 44px; border-radius: 16px; background: #fff; color: var(--rose-dark);
      box-shadow: 0 8px 18px rgba(140, 31, 56, 0.12); position: relative;
    }
    .badge {
      position: absolute; top: -4px; right: -3px; min-width: 18px; height: 18px; padding: 0 5px; border-radius: 999px; background: var(--gold); color: var(--dark);
      font-size: 0.66rem; font-weight: 700; display: grid; place-items: center;
    }
    .search-wrap { margin-top: 10px; display: flex; gap: 10px; }
    .search-bar {
      flex: 1; display: flex; align-items: center; gap: 8px; background: #fff; border: 1px solid var(--border);
      border-radius: 16px; padding: 0 14px; box-shadow: 0 6px 16px rgba(26,10,15,0.05);
    }
    .search-bar input { border: none; outline: none; background: transparent; flex: 1; height: 46px; font-size: 0.95rem; }
    .chip-btn, .ghost-btn, .primary-btn, .outline-btn, .tiny-btn, .tab-btn, .qty-btn, .size-btn, .color-btn, .status-chip, .filter-pill {
      border: none; cursor: pointer; transition: transform var(--transition), background var(--transition), color var(--transition), box-shadow var(--transition), opacity var(--transition);
    }
    .chip-btn:active, .ghost-btn:active, .primary-btn:active, .outline-btn:active, .tiny-btn:active, .tab-btn:active, .qty-btn:active, .size-btn:active, .color-btn:active, .filter-pill:active { transform: scale(0.97); }
    .view-stack { position: relative; min-height: calc(100vh - var(--bottom-h)); }
    .view {
      display: none; padding: 14px 14px 110px; animation: fadeIn 280ms ease;
    }
    .view.active { display: block; }
    .admin-mode .view { padding-bottom: 110px; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px);} to { opacity: 1; transform: translateY(0);} }
    .hero {
      background: linear-gradient(135deg, rgba(192,57,90,0.96), rgba(140,31,56,0.98)); color: white; border-radius: 24px; padding: 18px;
      box-shadow: var(--shadow); overflow: hidden; position: relative;
    }
    .hero::after {
      content: ''; position: absolute; inset: auto -40px -40px auto; width: 160px; height: 160px; border-radius: 50%; background: rgba(255,255,255,0.08);
    }
    .hero .tag { display: inline-flex; gap: 6px; align-items: center; padding: 6px 10px; border-radius: 999px; background: rgba(255,255,255,0.16); font-size: 0.75rem; }
    .hero h2 { margin: 12px 0 6px; font: 800 1.75rem/1.1 'Playfair Display', serif; }
    .hero p { margin: 0 0 14px; color: rgba(255,255,255,0.82); max-width: 250px; }
    .hero-cta { display: flex; align-items: center; gap: 10px; }
    .primary-btn {
      background: linear-gradient(135deg, var(--gold), #eccf8f); color: var(--dark); font-weight: 700; padding: 12px 18px; border-radius: 16px; box-shadow: 0 10px 18px rgba(212,168,83,0.28);
    }
    .ghost-btn {
      background: rgba(255,255,255,0.14); color: white; padding: 12px 15px; border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.15);
    }
    .section { margin-top: 18px; }
    .section-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 12px; }
    .section-head h3 { margin: 0; font: 700 1.15rem 'Playfair Display', serif; }
    .section-head small { color: var(--muted); }
    .chips-row, .scroll-row { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 4px; scrollbar-width: none; }
    .chips-row::-webkit-scrollbar, .scroll-row::-webkit-scrollbar, .bottom-nav::-webkit-scrollbar { display: none; }
    .chip-btn {
      flex: 0 0 auto; display: flex; align-items: center; gap: 8px; white-space: nowrap; padding: 12px 14px; border-radius: 16px; background: #fff; color: var(--dark); border: 1px solid var(--border); box-shadow: 0 6px 14px rgba(26,10,15,0.05);
    }
    .chip-btn.active { background: linear-gradient(135deg, var(--rose), var(--rose-dark)); color: white; }
    .promo-strip {
      margin-top: 16px; background: linear-gradient(135deg, rgba(212,168,83,0.18), rgba(212,168,83,0.06)); border: 1px dashed rgba(212,168,83,0.8);
      color: var(--dark); border-radius: 18px; padding: 14px; display: flex; align-items: center; justify-content: space-between; gap: 10px;
    }
    .promo-code { color: var(--rose-dark); font-weight: 700; }
    .card, .product-card, .mini-card, .admin-card, .order-card, .profile-card, .accordion-card {
      background: #fff; border-radius: 20px; border: 1px solid var(--border); box-shadow: 0 10px 18px rgba(26,10,15,0.05);
    }
    .flash-card { min-width: 190px; padding: 12px; position: relative; }
    .product-emoji {
      width: 100%; aspect-ratio: 1 / 1; display: grid; place-items: center; border-radius: 18px; font-size: 3rem; background: linear-gradient(135deg, rgba(192,57,90,0.14), rgba(212,168,83,0.18));
      user-select: none;
    }
    .product-card { padding: 10px; display: flex; flex-direction: column; gap: 10px; }
    .product-card .product-emoji { font-size: 2.6rem; }
    .product-title { font-weight: 700; font-size: 0.94rem; line-height: 1.25; min-height: 2.45em; }
    .price-row { display: flex; align-items: baseline; gap: 6px; flex-wrap: wrap; }
    .price { font-weight: 700; color: var(--rose-dark); }
    .old-price { color: var(--muted); text-decoration: line-through; font-size: 0.82rem; }
    .discount-badge, .status-badge, .sale-badge, .small-badge {
      display: inline-flex; align-items: center; gap: 6px; border-radius: 999px; font-size: 0.74rem; padding: 6px 10px; font-weight: 700;
    }
    .discount-badge, .sale-badge { background: rgba(192,57,90,0.12); color: var(--rose-dark); }
    .small-badge { background: rgba(212,168,83,0.18); color: #7d5716; }
    .status-badge.pending { background: rgba(243,156,18,0.16); color: #9f6406; }
    .status-badge.processing { background: rgba(52,152,219,0.16); color: #236b99; }
    .status-badge.shipped { background: rgba(142,68,173,0.16); color: #6f3790; }
    .status-badge.delivered { background: rgba(31,157,98,0.14); color: #17784b; }
    .meta-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; font-size: 0.8rem; color: var(--muted); }
    .stars { color: var(--gold); letter-spacing: 1px; }
    .grid-2 { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
    .actions-row { display: flex; gap: 8px; }
    .outline-btn, .tiny-btn {
      background: #fff; color: var(--rose-dark); border: 1px solid rgba(140,31,56,0.16); border-radius: 14px; padding: 10px 12px; font-weight: 700;
    }
    .tiny-btn { padding: 8px 10px; border-radius: 12px; font-size: 0.8rem; }
    .outline-btn.fill { background: rgba(192,57,90,0.08); }
    .w-full { width: 100%; }
    .progress {
      width: 100%; height: 8px; border-radius: 999px; background: rgba(140,31,56,0.08); overflow: hidden;
    }
    .progress > span { display: block; height: 100%; border-radius: 999px; background: linear-gradient(90deg, var(--gold), var(--rose)); }
    .testimonial-track { display: flex; transition: transform 320ms ease; }
    .testimonial-card { min-width: 100%; padding: 16px; }
    .testimonial-card p { margin: 0 0 12px; color: #54363f; line-height: 1.5; }
    .footer-card {
      margin-top: 18px; background: linear-gradient(135deg, #2a1017, var(--dark)); color: white; border-radius: 24px; padding: 18px;
    }
    .footer-card a { color: #ffd986; text-decoration: none; }
    .footer-links { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 8px; }
    .wa-btn {
      position: sticky; bottom: calc(var(--bottom-h) + 8px); margin-left: auto; margin-top: 14px; display: inline-flex; align-items: center; gap: 10px;
      background: #25D366; color: white; border: none; border-radius: 999px; padding: 12px 16px; box-shadow: 0 10px 18px rgba(37, 211, 102, 0.25); z-index: 10;
    }
    .filters { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 8px; }
    .filter-pill {
      background: #fff; border: 1px solid var(--border); border-radius: 14px; padding: 10px 10px; font-size: 0.84rem; color: var(--dark);
    }
    .list-stack { display: grid; gap: 12px; }
    .product-detail-image {
      width: 100%; aspect-ratio: 1 / 1; border-radius: 28px; background: linear-gradient(135deg, rgba(192,57,90,0.18), rgba(212,168,83,0.22));
      display: grid; place-items: center; font-size: 5rem; position: relative; overflow: hidden;
    }
    .swipe-hint { position: absolute; bottom: 14px; left: 50%; transform: translateX(-50%); font-size: 0.74rem; background: rgba(255,255,255,0.68); padding: 7px 10px; border-radius: 999px; }
    .selector-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .size-btn {
      min-width: 42px; padding: 11px 12px; border-radius: 12px; background: #fff; border: 1px solid var(--border); font-weight: 700;
    }
    .size-btn.active { background: var(--rose-dark); color: white; }
    .color-btn {
      width: 34px; height: 34px; border-radius: 50%; border: 3px solid transparent; box-shadow: inset 0 0 0 1px rgba(0,0,0,0.08);
    }
    .color-btn.active { border-color: var(--dark); transform: scale(1.05); }
    .qty-box {
      display: inline-flex; align-items: center; gap: 10px; background: #fff; border: 1px solid var(--border); border-radius: 16px; padding: 6px;
    }
    .qty-btn { width: 34px; height: 34px; border-radius: 12px; background: rgba(192,57,90,0.08); color: var(--rose-dark); font-weight: 700; }
    .tabs-row { display: flex; gap: 8px; }
    .tab-btn { flex: 1; border-radius: 14px; padding: 11px; background: #fff; border: 1px solid var(--border); font-weight: 700; }
    .tab-btn.active { background: var(--rose); color: white; }
    .tab-panel { padding: 14px; background: rgba(255,255,255,0.7); border-radius: 16px; border: 1px solid var(--border); line-height: 1.55; color: #5a4148; }
    .cart-item, .order-row, .admin-product-row, .category-row, .settings-row {
      display: grid; gap: 10px; padding: 12px;
    }
    .cart-item { grid-template-columns: 66px 1fr; align-items: center; }
    .thumb { width: 66px; height: 66px; border-radius: 18px; display: grid; place-items: center; font-size: 2rem; background: linear-gradient(135deg, rgba(192,57,90,0.14), rgba(212,168,83,0.18)); }
    .cart-meta h4, .admin-product-row h4, .order-card h4, .profile-card h4, .accordion-head h4 { margin: 0; }
    .muted { color: var(--muted); }
    .summary-box { padding: 14px; display: grid; gap: 10px; }
    .line-between { display: flex; justify-content: space-between; gap: 10px; }
    .line-between.total { font-weight: 700; font-size: 1.05rem; padding-top: 8px; border-top: 1px dashed rgba(140,31,56,0.15); }
    .field, .select, textarea {
      width: 100%; border: 1px solid var(--border); background: #fff; border-radius: 16px; padding: 13px 14px; outline: none;
    }
    textarea { min-height: 88px; resize: vertical; }
    .form-grid { display: grid; gap: 10px; }
    .accordion-card { overflow: hidden; }
    .accordion-head { padding: 14px; display: flex; justify-content: space-between; align-items: center; gap: 10px; cursor: pointer; }
    .accordion-body { display: none; padding: 0 14px 14px; }
    .accordion-card.open .accordion-body { display: block; }
    .empty-state {
      padding: 28px 20px; text-align: center; color: var(--muted); display: grid; gap: 10px; place-items: center;
    }
    .empty-state .emoji { font-size: 3rem; }
    .profile-card, .admin-card, .order-card { padding: 14px; }
    .link-list { display: grid; gap: 10px; }
    .link-item {
      display: flex; justify-content: space-between; align-items: center; background: rgba(192,57,90,0.05); padding: 14px; border-radius: 16px; border: 1px solid var(--border); cursor: pointer;
    }
    .bottom-nav {
      position: fixed; left: 50%; transform: translateX(-50%); bottom: 0; width: min(100%, 430px); display: grid; grid-template-columns: repeat(5, 1fr);
      gap: 8px; padding: 10px 12px calc(10px + env(safe-area-inset-bottom, 0px)); background: rgba(253, 246, 240, 0.94); backdrop-filter: blur(10px);
      border-top: 1px solid rgba(140,31,56,0.1); z-index: 50;
    }
    .nav-btn {
      border: none; background: transparent; display: grid; gap: 4px; place-items: center; color: var(--muted); padding: 8px 4px; border-radius: 16px; font-size: 0.72rem; font-weight: 700;
    }
    .nav-btn.active { color: var(--rose-dark); background: rgba(192,57,90,0.08); }
    .nav-icon { font-size: 1.12rem; }
    .hidden { display: none !important; }
    .toast-stack {
      position: fixed; left: 50%; transform: translateX(-50%); bottom: 94px; width: min(92%, 390px); display: grid; gap: 8px; z-index: 80;
    }
    .toast {
      padding: 12px 14px; border-radius: 16px; color: white; background: rgba(26,10,15,0.92); box-shadow: 0 10px 18px rgba(26,10,15,0.2); animation: toastIn 240ms ease;
    }
    @keyframes toastIn { from { opacity: 0; transform: translateY(8px);} to { opacity: 1; transform: translateY(0);} }
    .modal-backdrop {
      position: fixed; inset: 0; background: rgba(26,10,15,0.55); display: none; align-items: flex-end; justify-content: center; z-index: 90; padding: 12px;
    }
    .modal-backdrop.show { display: flex; }
    .modal {
      width: min(100%, 430px); max-height: 88vh; overflow: auto; background: var(--cream); border-radius: 26px 26px 14px 14px; padding: 18px; box-shadow: 0 20px 40px rgba(26,10,15,0.3);
    }
    .modal-head { display: flex; justify-content: space-between; align-items: center; gap: 10px; margin-bottom: 12px; }
    .close-btn { border: none; width: 38px; height: 38px; border-radius: 14px; background: rgba(192,57,90,0.08); color: var(--rose-dark); }
    .stats-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
    .stat-card { padding: 14px; border-radius: 18px; background: linear-gradient(135deg, rgba(192,57,90,0.08), rgba(212,168,83,0.12)); border: 1px solid var(--border); }
    .stat-card strong { display: block; margin-top: 8px; font-size: 1.25rem; }
    .admin-product-row, .category-row, .settings-row { background: rgba(255,255,255,0.76); border-radius: 18px; border: 1px solid var(--border); }
    .admin-product-row { grid-template-columns: 56px 1fr; align-items: center; }
    .row-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .toggle {
      position: relative; width: 52px; height: 30px; border-radius: 999px; background: rgba(140,31,56,0.16); cursor: pointer; flex-shrink: 0;
    }
    .toggle::after {
      content: ''; position: absolute; top: 3px; left: 3px; width: 24px; height: 24px; border-radius: 50%; background: white; transition: transform var(--transition);
    }
    .toggle.active { background: rgba(31,157,98,0.6); }
    .toggle.active::after { transform: translateX(22px); }
    .pill-tabs { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; }
    .status-chip { white-space: nowrap; padding: 9px 12px; border-radius: 999px; background: #fff; border: 1px solid var(--border); color: var(--dark); }
    .status-chip.active { background: var(--rose-dark); color: white; }
    .spinner-refresh {
      position: sticky; top: 0; z-index: 35; margin: 0 auto; width: 48px; height: 0; overflow: hidden; transition: height var(--transition); display: grid; place-items: center;
    }
    .spinner-refresh.show { height: 42px; }
    .spinner {
      width: 28px; height: 28px; border: 3px solid rgba(192,57,90,0.18); border-top-color: var(--rose); border-radius: 50%; animation: spin 800ms linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .order-card { display: grid; gap: 10px; }
    .order-summary { display: grid; gap: 5px; font-size: 0.88rem; color: #5a4048; }
    .admin-filter-row { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 6px; }
    .right { text-align: right; }
    .fade-text { min-height: 24px; }
    .mini-note { font-size: 0.78rem; color: var(--muted); }
    .order-success { text-align: center; padding: 10px 0 6px; }
    .order-success .emoji { font-size: 3.4rem; }
    .countdown { font-weight: 700; color: var(--rose-dark); }
    .heart-btn.active { background: rgba(192,57,90,0.12); color: var(--rose-dark); }
    .hidden-admin-trigger { opacity: 0.12; }
    .admin-panel .section:first-child { margin-top: 0; }
    .admin-header { display: flex; justify-content: space-between; align-items: center; gap: 10px; margin-bottom: 12px; }
    .center { text-align: center; }
    @media (min-width: 431px) {
      body { padding: 18px 0; }
      .app-shell, .bottom-nav { border-radius: 28px; }
      .bottom-nav { bottom: 12px; }
    }
  </style>
</head>
<body>
  <div class="app-shell" id="appShell">
    <div class="safe-top"></div>
    <div class="spinner-refresh" id="pullRefresh"><div class="spinner"></div></div>
    <header class="app-header" id="customerHeader">
      <div class="header-row">
        <div class="logo-pill" id="logoTapArea">
          <div class="logo-mark">🧵</div>
          <div class="logo-text">
            <h1 id="storeNameHeader">Samina Fashion</h1>
            <small>Pakistani fashion for every day ✨</small>
          </div>
        </div>
        <button class="icon-btn" id="bellBtn" aria-label="Notifications">🔔<span class="badge" id="notifBadge">3</span></button>
        <button class="icon-btn" id="headerCartBtn" aria-label="Cart">🛒<span class="badge" id="cartBadge">0</span></button>
      </div>
      <div class="search-wrap">
        <div class="search-bar">
          <span>🔎</span>
          <input id="globalSearch" placeholder="Search dresses, jewelry, handbags..." />
        </div>
        <button class="icon-btn" id="searchOpenBtn" aria-label="Search products">✨</button>
      </div>
    </header>

    <main class="view-stack" id="viewStack">
      <section class="view active" id="view-home"></section>
      <section class="view" id="view-shop"></section>
      <section class="view" id="view-product"></section>
      <section class="view" id="view-cart"></section>
      <section class="view" id="view-checkout"></section>
      <section class="view" id="view-orders"></section>
      <section class="view" id="view-wishlist"></section>
      <section class="view" id="view-profile"></section>
      <section class="view" id="view-admin"></section>
    </main>

    <button class="wa-btn" id="whatsappBtn">💬 WhatsApp Us</button>
  </div>

  <nav class="bottom-nav" id="customerNav">
    <button class="nav-btn active" data-view="home"><span class="nav-icon">🏠</span><span>Home</span></button>
    <button class="nav-btn" data-view="shop"><span class="nav-icon">🛍️</span><span>Shop</span></button>
    <button class="nav-btn" data-view="cart"><span class="nav-icon">🛒</span><span>Cart</span></button>
    <button class="nav-btn" data-view="wishlist"><span class="nav-icon">💖</span><span>Wishlist</span></button>
    <button class="nav-btn" data-view="profile"><span class="nav-icon">👤</span><span>Profile</span></button>
  </nav>

  <nav class="bottom-nav hidden" id="adminNav">
    <button class="nav-btn active" data-admin-tab="dashboard"><span class="nav-icon">📊</span><span>Dashboard</span></button>

    function renderFlashCountdown() {
      const el = document.getElementById('flashCountdown');
      if (!el || !app.countdownTarget) return;
      const diff = Math.max(0, app.countdownTarget - Date.now());
      const hrs = Math.floor(diff / 3600000);
      const mins = Math.floor((diff % 3600000) / 60000);
      const secs = Math.floor((diff % 60000) / 1000);
      el.textContent = `${String(hrs).padStart(2, '0')}h ${String(mins).padStart(2, '0')}m ${String(secs).padStart(2, '0')}s`;
      if (diff <= 0) setCountdown();

        setTimeout(() => {
          el.textContent = phrases[idx];
          el.style.opacity = '1';
        }, 180);
      }, 2600);

    function getFilteredProducts() {
      const { q, category, maxPrice, sort } = app.shopFilters;
      let items = getProducts().filter(p => p.price <= Number(maxPrice || 999999));
      if (category !== 'All') items = items.filter(p => p.category === category);
      if (q.trim()) items = items.filter(p => p.name.toLowerCase().includes(q.toLowerCase()) || p.category.toLowerCase().includes(q.toLowerCase()));
      items.sort((a, b) => {
        if (sort === 'newest') return b.id.localeCompare(a.id);
        if (sort === 'low-high') return a.price - b.price;
        if (sort === 'popular') return (b.sold || 0) - (a.sold || 0);
        return 0;
      });
      return items;
    }

    function cartEnriched() {
      return getCart().map(item => ({ ...item, product: productById(item.productId) })).filter(x => x.product);
    }

    function calculateCartTotals() {
      const settings = getSettings();
      const cart = cartEnriched();
      const subtotal = cart.reduce((sum, item) => sum + item.qty * item.product.price, 0);
      const promo = localStorage.getItem('sf_applied_promo') === settings.promoCode ? settings.promoDiscount : 0;
      const discount = Math.round(subtotal * (promo / 100));
      const delivery = subtotal > 0 && subtotal < settings.freeDeliveryMin ? 200 : 0;
      return { subtotal, discount, delivery, total: subtotal + delivery - discount };
    }

      const cart = cartEnriched();

      views.cart.innerHTML = cart.length ? `

    function openProduct(id) {
      app.productDetailId = id;
      app.selectedQty = 1;
      app.selectedSize = 'M';
      app.selectedColor = (productById(id) || {}).colors?.[0] || '#c0395a';
      renderProductDetail();
      showView('product');
    }

    function quickAddToCart(id) {
      const product = productById(id);
      if (!product) return;
      addToCart(product.id, 'M', product.colors[0] || '#c0395a', 1);
    }

    function addToCart(productId, size, color, qty) {
      const cart = getCart();
      const existing = cart.find(item => item.productId === productId && item.size === size && item.color === color);
      if (existing) existing.qty += qty;
      else cart.push({ productId, size, color, qty });
      saveCart(cart);
      updateBadges();
      renderCart();
      renderCheckout();
      toast('Added to cart');
    }

    function addDetailToCart() {
      addToCart(app.productDetailId, app.selectedSize, app.selectedColor, app.selectedQty);
    }

    function buyNow() {
      addDetailToCart();
      showView('checkout');
    }

    function removeFromCart(productId, size, color) {
      saveCart(getCart().filter(item => !(item.productId === productId && item.size === size && item.color === color)));
      renderCart();
      renderCheckout();
      updateBadges();
      toast('Item removed');
    }

    function changeCartQty(productId, size, color, delta) {
      const cart = getCart();
      const item = cart.find(i => i.productId === productId && i.size === size && i.color === color);
      if (!item) return;
      item.qty += delta;
      if (item.qty <= 0) return removeFromCart(productId, size, color);
      saveCart(cart);
      renderCart();
      renderCheckout();
      updateBadges();
    }

    function changeDetailQty(delta) {
      app.selectedQty = Math.max(1, app.selectedQty + delta);
      renderProductDetail();
    }

    function setSize(size) { app.selectedSize = size; renderProductDetail(); }
    function setColor(color) { app.selectedColor = color; renderProductDetail(); }
    function setDetailTab(tab) { app.detailTab = tab; renderProductDetail(); }
    function toggleAccordion(id) { document.getElementById(id)?.classList.toggle('open'); }

    function applyPromo() {
      const code = (document.getElementById('promoCodeInput') || {}).value?.trim().toUpperCase();
      const settings = getSettings();
      if (code === settings.promoCode.toUpperCase()) {
        localStorage.setItem('sf_applied_promo', settings.promoCode);
        toast('Promo code applied');
      } else {
        localStorage.removeItem('sf_applied_promo');
        toast('Invalid promo code');
      }
      renderCart();
      renderCheckout();
    }

    function placeOrder() {
      const name = document.getElementById('checkoutName')?.value.trim();
      const phone = document.getElementById('checkoutPhone')?.value.trim();
      const city = document.getElementById('checkoutCity')?.value.trim();
      const address = document.getElementById('checkoutAddress')?.value.trim();
      if (!name || !phone || !city || !address) return toast('Please fill all checkout fields');
      const cart = getCart();
      if (!cart.length) return toast('Your cart is empty');
      const totals = calculateCartTotals();
      const paymentMethod = document.querySelector('input[name="paymentMethod"]:checked')?.value || 'Cash on Delivery';
      const order = {
        id: `SF${Date.now().toString().slice(-6)}`,
        date: new Date().toISOString(),
        items: cart.map(item => ({ ...item, price: productById(item.productId)?.price || 0 })),
        customer: { name, phone, city, address },
        paymentMethod,
        status: 'Pending',
        total: totals.total,
        subtotal: totals.subtotal,
        delivery: totals.delivery,
        discount: totals.discount
      };
      const orders = [order, ...getOrders()];
      saveOrders(orders);
      saveProfile({ name, phone });
      saveCart([]);
      localStorage.removeItem('sf_applied_promo');
      renderAll();
      openModal(`
        <div class="modal-head"><h3 style="margin:0;">Order Confirmed</h3><button class="close-btn" onclick="closeModal()">✕</button></div>
        <div class="order-success">
          <div class="emoji">🎉</div>
          <h3>Your order has been placed!</h3>
          <p>Order ID: <strong>${order.id}</strong></p>
          <div class="actions-row" style="margin-top:14px;justify-content:center;">
            <button class="outline-btn" onclick="sendOrderWhatsapp('${order.id}')">WhatsApp Order</button>
            <button class="primary-btn" onclick="closeModal();showView('orders')">My Orders</button>
          </div>
        </div>`);
      toast('Order placed successfully');
      showView('orders');
    }

    function sendOrderWhatsapp(orderId) {
      const order = getOrders().find(o => o.id === orderId);
      if (!order) return;
      const msg = encodeURIComponent(`Assalam o Alaikum! I placed order ${order.id} at ${getSettings().storeName}. Total: ${fmt(order.total)}. Payment: ${order.paymentMethod}.`);
      window.open(`https://wa.me/${getSettings().whatsapp}?text=${msg}`, '_blank');
    }

    function openWhatsappGeneral() {
      const msg = encodeURIComponent(`Assalam o Alaikum! I'm interested in shopping from ${getSettings().storeName} (${getSettings().domain}).`);
      window.open(`https://wa.me/${getSettings().whatsapp}?text=${msg}`, '_blank');
    }

    function filterCategory(category) {
      app.shopFilters.category = category;
      app.shopPage = 1;
      renderShop();
      showView('shop');
    }

    function updateShopFilter(key, value) {
      app.shopFilters[key] = value;
      app.shopPage = 1;
      renderShop();
    }

    function loadMoreProducts() {
      app.shopPage += 1;
      renderShop();
    }

    function toggleWishlist(id) {
      const wish = getWishlist();
      const index = wish.indexOf(id);
      if (index >= 0) { wish.splice(index, 1); toast('Removed from wishlist'); }
      else { wish.push(id); toast('Saved to wishlist'); }
      saveWishlist(wish);
      renderHome(); renderShop(); renderWishlist(); renderProductDetail();
    }

    function bindSwipe(colors) {
      const el = document.getElementById('swipeImage');
      if (!el || !colors?.length) return;
      let startX = 0;
      el.ontouchstart = (e) => { startX = e.touches[0].clientX; };
      el.ontouchend = (e) => {
        const diff = e.changedTouches[0].clientX - startX;
        const idx = colors.indexOf(app.selectedColor);
        if (Math.abs(diff) < 30) return;
        let next = idx;
        if (diff < 0) next = (idx + 1) % colors.length;
        else next = (idx - 1 + colors.length) % colors.length;
        app.selectedColor = colors[next];
        renderProductDetail();
      };
      el.style.boxShadow = `inset 0 0 0 6px ${app.selectedColor}`;
    }

    function promptAdmin() {
      openModal(`
        <div class="modal-head"><h3 style="margin:0;">Admin Login</h3><button class="close-btn" onclick="closeModal()">✕</button></div>
        <div class="form-grid">
          <input class="field" id="adminPassInput" type="password" placeholder="Enter password" />
          <button class="primary-btn w-full" onclick="verifyAdmin()">Unlock Admin Panel</button>
        </div>`);
    }

    function verifyAdmin() {
      const pass = document.getElementById('adminPassInput')?.value;
      if (pass === localStorage.getItem(STORAGE_KEYS.adminPass)) {
        closeModal();
        enterAdmin();
      } else {
        toast('Incorrect password');
      }
    }

    function handleLogoTap() {
      const now = Date.now();
      app.logoTaps = app.logoTaps.filter(t => now - t < 2200);
      app.logoTaps.push(now);
      if (app.logoTaps.length >= 5) {
        app.logoTaps = [];
        promptAdmin();
      }
    }

    function setAdminTab(tab) {
      app.currentAdminTab = tab;
      renderAdmin();
      syncNavs();
    }

    function openProductForm(id = '') {
      app.editingProductId = id || null;
      const product = id ? productById(id) : { name: '', category: getCategories()[0]?.name || 'Dresses', price: '', oldPrice: '', stock: '', description: '', emoji: '✨', flashSale: false, featured: false };
      openModal(`
        <div class="modal-head"><h3 style="margin:0;">${id ? 'Edit' : 'Add'} Product</h3><button class="close-btn" onclick="closeModal()">✕</button></div>
        <div class="form-grid">
          <input class="field" id="pfName" placeholder="Product Name" value="${escapeHtml(product.name)}" />
          <select class="field" id="pfCategory">${getCategories().map(c => `<option value="${escapeHtml(c.name)}" ${product.category === c.name ? 'selected' : ''}>${escapeHtml(c.name)}</option>`).join('')}</select>
          <input class="field" id="pfPrice" type="number" placeholder="Price" value="${product.price}" />
          <input class="field" id="pfOldPrice" type="number" placeholder="Old Price" value="${product.oldPrice}" />
          <input class="field" id="pfStock" type="number" placeholder="Stock Quantity" value="${product.stock}" />
          <textarea id="pfDescription" placeholder="Description">${escapeHtml(product.description)}</textarea>
          <input class="field" id="pfEmoji" placeholder="Emoji" value="${escapeHtml(product.emoji)}" />
          <label class="link-item"><span>Flash Sale</span><input id="pfFlash" type="checkbox" ${product.flashSale ? 'checked' : ''} /></label>
          <label class="link-item"><span>Featured</span><input id="pfFeatured" type="checkbox" ${product.featured ? 'checked' : ''} /></label>
          <button class="primary-btn w-full" onclick="saveProductForm()">Save Product</button>
        </div>`);
    }

    function saveProductForm() {
      const products = getProducts();
      const payload = {
        id: app.editingProductId || `p${Date.now()}`,
        name: document.getElementById('pfName').value.trim(),
        category: document.getElementById('pfCategory').value,
        price: Number(document.getElementById('pfPrice').value),
        oldPrice: Number(document.getElementById('pfOldPrice').value),
        stock: Number(document.getElementById('pfStock').value),
        description: document.getElementById('pfDescription').value.trim(),
        emoji: document.getElementById('pfEmoji').value.trim() || '✨',
        flashSale: document.getElementById('pfFlash').checked,
        featured: document.getElementById('pfFeatured').checked,
        rating: 4.6,
        sold: Math.floor(Math.random() * 70) + 10,
        colors: ['#c0395a', '#d4a853', '#fdf6f0', '#2d3748']
      };
      if (!payload.name || !payload.price || !payload.oldPrice) return toast('Please complete product form');
      const index = products.findIndex(p => p.id === payload.id);
      if (index >= 0) products[index] = { ...products[index], ...payload };
      else products.unshift(payload);
      saveProducts(products);
      closeModal();
      renderAll();
      toast('Product saved');
    }

    function deleteProduct(id) {
      if (!confirm('Delete this product?')) return;
      saveProducts(getProducts().filter(p => p.id !== id));
      renderAll();
      toast('Product deleted');
    }

    function updateOrderStatus(orderId, status) {
      const orders = getOrders();
      const order = orders.find(o => o.id === orderId);
      if (!order) return;
      order.status = status;
      saveOrders(orders);
      renderOrders();
      renderAdmin();
      toast(`Order ${orderId} updated`);
    }

    function setOrderFilter(status) {
      app.orderFilter = status;
      renderAdmin();
    }

    function openCategoryForm(id = '') {
      app.editingCategoryId = id || null;
      const category = id ? getCategories().find(c => c.id === id) : { name: '', emoji: '🏷️', visible: true };
      openModal(`
        <div class="modal-head"><h3 style="margin:0;">${id ? 'Edit' : 'Add'} Category</h3><button class="close-btn" onclick="closeModal()">✕</button></div>
        <div class="form-grid">
          <input class="field" id="cfName" placeholder="Category Name" value="${escapeHtml(category.name)}" />
          <input class="field" id="cfEmoji" placeholder="Emoji" value="${escapeHtml(category.emoji)}" />
          <label class="link-item"><span>Visible on homepage</span><input id="cfVisible" type="checkbox" ${category.visible ? 'checked' : ''} /></label>
          <button class="primary-btn w-full" onclick="saveCategoryForm()">Save Category</button>
        </div>`);
    }

    function saveCategoryForm() {
      const categories = getCategories();
      const payload = {
        id: app.editingCategoryId || `c${Date.now()}`,
        name: document.getElementById('cfName').value.trim(),
        emoji: document.getElementById('cfEmoji').value.trim() || '🏷️',
        visible: document.getElementById('cfVisible').checked
      };
      if (!payload.name) return toast('Category name is required');
      const index = categories.findIndex(c => c.id === payload.id);
      if (index >= 0) categories[index] = payload;
      else categories.push(payload);
      saveCategories(categories);
      closeModal();
      renderAll();
      toast('Category saved');
    }

    function deleteCategory(id) {
      if (!confirm('Delete this category?')) return;
      saveCategories(getCategories().filter(c => c.id !== id));
      renderAll();
      toast('Category deleted');
    }

    function toggleCategoryVisibility(id) {
      const categories = getCategories();
      const category = categories.find(c => c.id === id);
      if (!category) return;
      category.visible = !category.visible;
      saveCategories(categories);
      renderAll();
    }

    function saveAdminSettings() {
      const settings = {
        ...getSettings(),
        storeName: document.getElementById('settingStoreName').value.trim() || 'Samina Fashion Store',
        whatsapp: document.getElementById('settingWhatsapp').value.trim() || '923001234567',
        freeDeliveryMin: Number(document.getElementById('settingFreeDelivery').value) || 1500,
        promoCode: document.getElementById('settingPromoCode').value.trim().toUpperCase() || 'SAMINA10',
        promoDiscount: Number(document.getElementById('settingPromoDiscount').value) || 10,
        flashHours: Number(document.getElementById('settingFlashHours').value) || 2,
        flashMinutes: Number(document.getElementById('settingFlashMinutes').value) || 47
      };
      saveSettings(settings);
      const newPass = document.getElementById('settingAdminPassword').value.trim();
      if (newPass) localStorage.setItem(STORAGE_KEYS.adminPass, newPass);
      setCountdown();
      renderAll();
      toast('Settings saved');
    }

    function searchFromHeader() {
      app.shopFilters.q = document.getElementById('globalSearch').value.trim();
      app.shopPage = 1;
      renderShop();
      showView('shop');
    }

    function initEvents() {
      document.getElementById('modalBackdrop').addEventListener('click', (e) => { if (e.target.id === 'modalBackdrop') closeModal(); });
      document.getElementById('headerCartBtn').addEventListener('click', () => showView('cart'));
      document.getElementById('searchOpenBtn').addEventListener('click', searchFromHeader);
      document.getElementById('globalSearch').addEventListener('keydown', (e) => { if (e.key === 'Enter') searchFromHeader(); });
      document.getElementById('bellBtn').addEventListener('click', () => toast('New arrivals and flash sale alerts enabled'));
      document.getElementById('whatsappBtn').addEventListener('click', openWhatsappGeneral);
      document.getElementById('logoTapArea').addEventListener('click', handleLogoTap);
      document.querySelectorAll('#customerNav .nav-btn').forEach(btn => btn.addEventListener('click', () => showView(btn.dataset.view)));
      document.querySelectorAll('#adminNav .nav-btn').forEach(btn => btn.addEventListener('click', () => setAdminTab(btn.dataset.adminTab)));
      window.addEventListener('popstate', (e) => {
        const view = e.state?.view || 'home';
        app.adminMode = !!e.state?.adminMode;
        showView(view, { skipHistory: true });
      });
      initPullToRefresh();
      initInfiniteScroll();
    }

    function initInfiniteScroll() {
      window.addEventListener('scroll', () => {
        if (app.currentView !== 'shop') return;
        if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 140) {
          const total = getFilteredProducts().length;
          if (app.shopPage * app.shopPageSize < total) {
            app.shopPage += 1;
            renderShop();
          }
        }
      }, { passive: true });
    }

    function initPullToRefresh() {
      const spinner = document.getElementById('pullRefresh');
      window.addEventListener('touchstart', (e) => {
        if (window.scrollY <= 0) {
          app.pullState.startY = e.touches[0].clientY;
          app.pullState.active = true;
          app.pullState.triggered = false;
        }
      }, { passive: true });
      window.addEventListener('touchmove', (e) => {
        if (!app.pullState.active) return;
        const diff = e.touches[0].clientY - app.pullState.startY;
        if (diff > 70 && !app.pullState.triggered) {
          app.pullState.triggered = true;
          spinner.classList.add('show');
        }
      }, { passive: true });
      window.addEventListener('touchend', () => {
        if (app.pullState.triggered) {
          setTimeout(() => {
            spinner.classList.remove('show');
            renderAll();
            toast('Store refreshed');
          }, 900);
        }
        app.pullState.active = false;
      });
    }

    seedStorage();
    setCountdown();
    renderAll();
    initEvents();
    startIntervals();
    history.replaceState({ view: 'home', adminMode: false }, '');
    window.showView = showView;
    window.filterCategory = filterCategory;
    window.updateShopFilter = updateShopFilter;
    window.loadMoreProducts = loadMoreProducts;
    window.openProduct = openProduct;
    window.quickAddToCart = quickAddToCart;
    window.toggleWishlist = toggleWishlist;
    window.setSize = setSize;
    window.setColor = setColor;
    window.changeDetailQty = changeDetailQty;
    window.addDetailToCart = addDetailToCart;
    window.buyNow = buyNow;
    window.setDetailTab = setDetailTab;
    window.changeCartQty = changeCartQty;
    window.removeFromCart = removeFromCart;
    window.applyPromo = applyPromo;
    window.placeOrder = placeOrder;
    window.toggleAccordion = toggleAccordion;
    window.sendOrderWhatsapp = sendOrderWhatsapp;
    window.openWhatsappGeneral = openWhatsappGeneral;
    window.promptAdmin = promptAdmin;
    window.verifyAdmin = verifyAdmin;
    window.exitAdmin = exitAdmin;
    window.openProductForm = openProductForm;
    window.saveProductForm = saveProductForm;
    window.deleteProduct = deleteProduct;
    window.updateOrderStatus = updateOrderStatus;
    window.setOrderFilter = setOrderFilter;
    window.openCategoryForm = openCategoryForm;
    window.saveCategoryForm = saveCategoryForm;
    window.deleteCategory = deleteCategory;
    window.toggleCategoryVisibility = toggleCategoryVisibility;
    window.saveAdminSettings = saveAdminSettings;
    window.closeModal = closeModal;
  </script>
</body>
</html>
